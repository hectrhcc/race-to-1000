name: Update Player Goals

on:
  # Se ejecuta automáticamente todos los días a las 06:00 UTC
  schedule:
    - cron: '0 6 * * *'

  # Permite ejecución manual desde la interfaz de GitHub
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no commit)'
        required: false
        default: false
        type: boolean

jobs:
  update-goals:
    name: Fetch & Update Player Goals
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # Ejecuta tu script de scraping/API
      - name: Fetch latest goal data
        run: node scripts/fetch-goals.cjs
        env:
          DRY_RUN: ${{ inputs.dry_run || 'false' }}

      - name: Check for changes
        id: diff
        run: |
          git diff --exit-code src/data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: inputs.dry_run != true
        run: |
          git config --global user.name "hectrhcc"
          git config --global user.email "95552068+hectrhcc@users.noreply.github.com"
          git add src/data/players.json src/data/history.json
          git commit -m "chore(data): update player goals $(date -u +%Y-%m-%d)"
          git push