<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Dark background with rounded corners -->
  <rect width="48" height="48" rx="12" fill="#09090b"/>
  
  <!-- Outer gold ring -->
  <circle cx="24" cy="24" r="20" stroke="#fbbf24" stroke-width="2.5" opacity="0.5"/>
  <circle cx="24" cy="24" r="17" stroke="#fbbf24" stroke-width="1" opacity="0.3"/>
  
  <!-- Football / Soccer ball -->
  <circle cx="24" cy="24" r="12" fill="#1a1a1a" stroke="#fbbf24" stroke-width="0.8"/>
  
  <!-- Pentagon center -->
  <polygon points="24,17 28,19.5 27,24 21,24 20,19.5" fill="#fbbf24" opacity="0.9"/>
  
  <!-- Pentagon connecting lines -->
  <line x1="24" y1="17" x2="24" y2="14" stroke="#fbbf24" stroke-width="0.6" opacity="0.4"/>
  <line x1="28" y1="19.5" x2="32" y2="18" stroke="#fbbf24" stroke-width="0.6" opacity="0.4"/>
  <line x1="27" y1="24" x2="31" y2="26" stroke="#fbbf24" stroke-width="0.6" opacity="0.4"/>
  <line x1="21" y1="24" x2="17" y2="26" stroke="#fbbf24" stroke-width="0.6" opacity="0.4"/>
  <line x1="20" y1="19.5" x2="16" y2="18" stroke="#fbbf24" stroke-width="0.6" opacity="0.4"/>
  
  <!-- Side pentagons (partial) -->
  <polygon points="31,21 32,24 30,26 28,24.5 29,21.5" fill="#fbbf24" opacity="0.5"/>
  <polygon points="17,21 16,24 18,26 20,24.5 19,21.5" fill="#fbbf24" opacity="0.5"/>
  <polygon points="24,31 27,29 26,26.5 22,26.5 21,29" fill="#fbbf24" opacity="0.5"/>
</svg>
